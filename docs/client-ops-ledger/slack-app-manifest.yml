display_information:
  name: AOH Agents
features:
  bot_user:
    display_name: Manager
    always_online: true
  slash_commands:
    - command: /manager
      url: https://aioutsourcehub.com/api/agent/slack
      description: Talk to the AOH Manager and agent team
      usage_hint: what is status of Reach Cold Email Campaign
      should_escape: false
oauth_config:
  scopes:
    bot:
      - commands
      - chat:write
      - channels:history
      - channels:read
      - groups:history
      - groups:read
settings:
  event_subscriptions:
    request_url: https://aioutsourcehub.com/api/agent/slack
    bot_events:
      - message.channels
      - message.groups
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
